<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>カフェのメニュー表</title>
</head>
<body class="font-serif bg-zinc-400 min-h-screen p-12">        
    <h1 class="text-4xl font-bold text-center mb-24">メニュー表</h1>
    <main class="gap-8">
        <section class="mb-36">
            <h2 class="text-3xl font-bold text-center pt-2 pb-4">ドリンク</h2>
            <div class="bg-white shadow-md pb-4 mb-8 text-center">
                <img src="images/コーヒー.webp" alt="エスプレッソの画像" class="w-full h-64 object-cover">
                <h2 class="text-xl p-4">エスプレッソ</h2>
                <p class="text-gray-500 p-2">￥400</p>
                <a href="#" class="block text-sm text-gray-700 pt-4 hover:text-blue-700">アレルゲン情報</a>
            </div>
            <div class="bg-white shadow-md pb-4 mb-8 text-center">
                <img src="images/カフェラテ.jpeg" alt="カフェラテの画像" class="w-full h-64 object-cover">
                <h2 class="text-xl p-4">カフェラテ</h2>
                <p class="text-gray-500 p-2">￥450</p>
                <a href="#" class="block text-sm text-gray-700 pt-4 hover:text-blue-700">アレルゲン情報</a>
            </div>
            <div class="bg-white shadow-md pb-4 mb-8 text-center">
                <img src="images/ミルク.jpeg" alt="ミルクの画像" class="w-full h-64 object-cover">
                <h2 class="text-xl p-4">ミルク</h2>
                <p class="text-gray-500 p-2">￥400</p>
                <a href="#" class="block text-sm text-gray-700 pt-4 hover:text-blue-700">アレルゲン情報</a>
            </div>
        </section>
        <section class="mb-36">
            <h2 class="text-3xl font-bold text-center pt-2 pb-4">スウィーツ</h2>
            <div class="bg-white shadow-md pb-4 mb-8 text-center">
                <img src="images/ショートケーキ.jpeg" alt="ショートケーキの画像" class="w-full h-64 object-cover">
                <h2 class="text-xl p-4">ショートケーキ</h2>
                <p class="text-gray-500 p-2">￥500</p>
                <a href="#" class="block text-sm text-gray-700 pt-4 hover:text-blue-700">アレルゲン情報</a>
            </div>
            <div class="bg-white shadow-md pb-4 mb-8 text-center">
                <img src="images/チョコレートケーキ.jpeg" alt="チョコレートケーキの画像" class="w-full h-64 object-cover">
                <h2 class="text-xl p-4">チョコレートケーキ</h2>
                <p class="text-gray-500 p-2">￥550</p>
                <a href="#" class="block text-sm text-gray-700 pt-4 hover:text-blue-700">アレルゲン情報</a>
            </div>
            <div class="bg-white shadow-md pb-4 mb-8 text-center">
                <img src="images/フルーツタルト.jpeg" alt="フルーツタルトの画像" class="w-full h-64 object-cover">
                <h2 class="text-xl p-4">フルーツタルト</h2>
                <p class="text-gray-500 p-2">￥600</p>
                <a href="#" class="block text-sm text-gray-700 pt-4 hover:text-blue-700">アレルゲン情報</a>
            </div>
        </section>
    <p class="text-center p-8">ごゆっくりどうぞ</p>
</body>

</html>
