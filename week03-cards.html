<!DOCTYPE html>
<html lang="ja">
<head class="bg-gray-900">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>week03 cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-300 min-h-screen gap-8 p-8 text-center">
    <h1 class="font-bold text-4xl mb-12">チームメンバー</h1>
    <div class="flex flex-col md:flex-row gap-6 justify-center items-stretch">
        <div class="bg-white rounded-lg shadow flex flex-col items-center justify-center flex-1 p-4">
            <img src="./images/doraemonn.webp" alt="ドラえもんの画像" class="w-40 h-48 overflow-hidden object-cover">
            <h2 class="text-xl font-bold mt-8">ドラえもん</h2>
            <p class="text-gray-600 mx-2 my-4 text-balance break-keep">未来からやってきた猫型ロボット。
                素敵な秘密道具でのび太を助ける。</p>
        </div>
        <div class="bg-white rounded-lg shadow flex flex-col items-center justify-center flex-1 p-4">
            <img src="./images/Nobita.jpg" alt="のび太の画像" class="w-36 h-48 overflow-hidden object-cover">
            <h2 class="text-xl font-bold mt-8">のび太</h2>
            <p class="text-gray-600 mx-2 my-4 text-balance break-keep">勉強や運動が苦手で、ドラえもんに助けを求める。優しい心を持つ純粋な少年。</p>
        </div>

        <div class="bg-white rounded-lg shadow flex flex-col items-center justify-center flex-1 p-4">
            <img src="./images/shizuka.jpg" alt="しずかちゃんの画像" class="w-36 h-48 overflow-hidden object-cover">
            <h2 class="text-xl font-bold mt-8">しずかちゃん</h2>
            <p class="text-gray-600 mx-2 my-4 text-balance break-keep">のび太のクラスメートで、優しい女の子。のび太にとって大切な存在。</p>
        </div>
    </div> 
    
    <footer class="text-sm text-white text-center m-12">
        <p>@2026 Team Draemon</p>
        <a href="https://dora-world.com/" class="text-white hover:text-blue-700 m-2">公式サイト</a>
    </footer>
</body>
