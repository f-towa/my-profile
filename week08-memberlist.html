<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week08 memberList</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-950 via-blue-950 to-slate-950 text-white">
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-16 left-10 text-yellow-200 text-3xl opacity-70">✦</div>
        <div class="absolute top-32 right-24 text-yellow-100 text-xl opacity-60">✧</div>
        <div class="absolute bottom-32 left-20 text-yellow-200 text-2xl opacity-70">✦</div>
        <div class="absolute bottom-20 right-12 text-yellow-100 text-4xl opacity-50">✧</div>
    </div>
    <header class="relative z-10 px-6 py-8">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="text-2xl md:text-3xl font-bold tracking-wide">Disney Character Gallery</h1>
            <nav class="hidden md:flex gap-6 text-sm text-blue-100">
                <a href="#" class="hover:text-yellow-200 transition">Home</a>
                <a href="#characters" class="hover:text-yellow-200 transition">Characters</a>
                <a href="https://www.tokyodisneyresort.jp/" class="hover:text-yellow-200 transition">Official</a>
            </nav>
        </div>
    </header>
    <section class="relative z-10 px-6 pt-8 pb-12">
        <div class="max-w-6xl mx-auto text-center">
            <p class="inline-block mb-5 px-4 py-2 rounded-full bg-white/10 border border-white/20 text-sm text-blue-100">✨ Welcome to the magical world ✨</p>
            <h2 class="text-4xl md:text-6xl font-extrabold leading-tight">Disney Characters</h2>
            <p class="mt-5 text-blue-100 max-w-2xl mx-auto leading-relaxed">お気に入りのキャラクターをカテゴリごとに見つけよう。</p>
        </div>
    </section>

    <main id="characters" class="relative z-10 px-6 pb-16">
        <div class="max-w-6xl mx-auto">
            <div class="mb-10 p-5 rounded-3xl bg-white/10 border border-white/20 backdrop-blur-md shadow-2xl">
                <div class="flex flex-wrap justify-center gap-4">
                    <button id="allBtn" class="px-5 py-3 rounded-full bg-yellow-300 text-slate-900 font-bold hover:bg-yellow-200 transition shadow-lg" data-filter="all">全員</button>
                    <button id="classicBtn" class="px-5 py-3 rounded-full bg-white/10 border border-white/30 text-white font-bold hover:bg-white/20 transition" data-filter="classic">クラシック</button>
                    <button id="princessBtn" class="px-5 py-3 rounded-full bg-white/10 border border-white/30 text-white font-bold hover:bg-white/20 transition" data-filter="princess">プリンセス</button>
                    <button id="villainBtn" class="px-5 py-3 rounded-full bg-white/10 border border-white/30 text-white font-bold hover:bg-white/20 transition" data-filter="villain">ヴィランズ</button>
                    <button id="pixarBtn" class="px-5 py-3 rounded-full bg-white/10 border border-white/30 text-white font-bold hover:bg-white/20 transition" data-filter="pixar">ピクサー</button>
                </div>
            </div>
            <section id="characterList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

            </section>
        </div>
    </main>

    <footer class="relative z-10 px-6 py-8 border-t border-white/10">
        <div class="max-w-6xl mx-auto text-center text-sm text-blue-100">
            <p>© 2026 Magic Character Gallery</p>
        </div>
    </footer>

    <script>
        const characters = [
            { name: "Mickey Mouse", category: "classic", categoryLabel: "クラシック", comment: "明るく前向きで、みんなを笑顔にしてくれるキャラクター。", image: "./images/Mickey Mouse.jpg" },
            { name: "Minnie Mouse", category: "classic", categoryLabel: "クラシック", comment: "おしゃれでやさしく、かわいらしい雰囲気が魅力のキャラクター。", image: "./images/Minnie.webp" },
            { name: "Donald Duck", category: "classic", categoryLabel: "クラシック", comment: "少し短気だけど、どこか憎めない人気キャラクター。", image: "./images/DonaldDuck.webp" },
            { name: "Goofy", category: "classic", categoryLabel: "クラシック", comment: "のんびりしていて、天然なところが魅力のキャラクター。", image: "./images/Goofy.jpg" },
            { name: "Ariel", category: "princess", categoryLabel: "プリンセス", comment: "好奇心が強く、自分の夢に向かって進むキャラクター。", image: "./images/Ariel.png" },
            { name: "Belle", category: "princess", categoryLabel: "プリンセス", comment: "本が好きで、外見だけでなく内面を大切にするキャラクター。", image: "./images/Belle.jpg" },
            { name: "Elsa", category: "princess", categoryLabel: "プリンセス", comment: "強い力を持ちながら、自分らしさと向き合うキャラクター。", image: "./images/Elsa.png" },
            { name: "Woody", category: "pixar", categoryLabel: "ピクサー", comment: "仲間思いで、頼れるリーダーのようなキャラクター。", image: "./images/Woody.jpg" },
            { name: "Buzz Lightyear", category: "pixar", categoryLabel: "ピクサー", comment: "勇敢でまっすぐな性格を持つ、宇宙ヒーローのようなキャラクター。", image: "./images/BuzzLightyear.webp" },
            { name: "Maleficent", category: "villain", categoryLabel: "ヴィランズ", comment: "強い存在感とミステリアスな雰囲気を持つキャラクター。", image: "./images/Maleficent.jpg" },
        ];
        const characterList = document.querySelector("#characterList");
        const allBtn = document.querySelector("#allBtn");
        const classicBtn = document.querySelector("#classicBtn");
        const princessBtn = document.querySelector("#princessBtn");
        const villainBtn = document.querySelector("#villainBtn");
        const pixarBtn = document.querySelector("#pixarBtn");
        
        function renderCharacters(characterArray) {
            characterList.innerHTML = "";
            characterArray.forEach((character) => {
                const card = document.createElement("article");
                card.className = "rounded-3xl bg-white/10 border border-white/20 backdrop-blur-md overflow-hidden shadow-xl hover:-translate-y-2 hover:shadow-yellow-300/20 transition duration-300";
                card.dataset.category = character.category;
                card.innerHTML = `
                    <div class="h-56 bg-gradient-to-br from-blue-200 to-indigo-300 flex items-center justify-center">
                        <img src="${character.image}" class="w-40 h-40 rounded-full border-4 border-white shadow-lg bg-white/70 flex text-5xl group-hover:scale-105 transition object-cover"></img>
                    </div>
                    <div class="p-5">
                        <p class="text-xs text-yellow-200 mb-2">${character.categoryLabel}</p>
                        <h3 class="text-xl font-bold mb-2">${character.name}</h3>
                        <p class="text-sm text-blue-100 leading-relaxed">${character.comment}</p>
                    </div>
                `;
                characterList.appendChild(card)
            })
        }
        renderCharacters(characters);

        allBtn.addEventListener("click", () => {
            renderCharacters(characters);
        })

        classicBtn.addEventListener("click", () => {
            const classic = characters.filter((character) => {
                return character.category === "classic";
            });
            renderCharacters(classic);
        })

        princessBtn.addEventListener("click", () => {
            const princess = characters.filter((character) => {
                return character.category === "princess";
            })
            renderCharacters(princess);
        })
        
        villainBtn.addEventListener("click", () => {
            const villain = characters.filter((character) => {
                return character.category === "villain";
            })
            renderCharacters(villain);
        })

        pixarBtn.addEventListener("click", () => {
            const pixar = characters.filter((character) => {
                return character.category === "pixar";
            })
            renderCharacters(pixar)
        })
        

    </script>

</body>
</html>
